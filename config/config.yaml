logging_level: 20
matplotlib:
  font:
    family: serif
    sans_serif:
      - Helvetica
    serif:
      - "Computer Modern Roman"

# ------ Main parameters -----
process_data: false
input_files: [
  "us_4q_fred_x.parquet"
  # "oap_avg_x.parquet"
]
target_file: 'us_4q_fred_y.parquet'

# Training parameters
year: 1997
target_idx: 0
country: "us"
horizon_in_quarters: 4

# Model hyperparameters
trials: 50
time_steps: 12
quantiles: [0.05, 0.25, 0.50, 0.75, 0.95]
n_estimators: 5
k_folds: 10


# Runtime flags
overwrite_log: false
local: false
skip_processed_data: true

# ----- Data construction parameters -----
oap_release: 202510
construct_oap_signals: true

# OAP signal construction configurations
oap_signals:
  - signal: "avg"
    output_name: "oap_avg"
  - signal: "vw_avg"
    output_name: "oap_vw"
  - signal: "spread"
    quantiles: 10
    output_name: "oap_spread"

# OAP data configurations
oap_datasets:
  - name: "oap_avg"
    file: "oap_firm_avg.csv"
    first_difference: false
    output_name: "oap_avg_x"
  - name: "oap_avg_fd"
    file: "oap_firm_avg.csv"
    first_difference: true
    output_name: "oap_avg_fd_x"
  # Add more OAP variants here as needed
  - name: "oap_vw"
    file: "oap_firm_vw_avg.csv"
    first_difference: false
    output_name: "oap_vw_x"
  - name: "oap_vw_fd"
    file: "oap_firm_vw_avg.csv"
    first_difference: true
    output_name: "oap_vw_fd_x"
  - name: "oap_spread"
    file: "oap_firm_spread.csv"
    first_difference: false
    output_name: "oap_spread_x"
  - name: "oap_spread_fd"
    file: "oap_firm_spread.csv"
    first_difference: true
    output_name: "oap_spread_fd_x"

desired_start_date_of_samples: "1961-01-01"
desired_end_date_of_samples: "2024-12-01"
initial_training_last_date: "1997-12-01"
last_date_of_sample: "2024-12-01"

remove_cols_threshold: 0.3




